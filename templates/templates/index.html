<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CRUD App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Blog Sharing CRUD Application</h1>

        <h2>Add New Blog</h2>
        <form action="/add" method="POST" class="form-box">
            <input type="text" name="title" placeholder="Blog title" required>
            <textarea name="content" placeholder="Blog content" required></textarea>

            <select name="user_id" required>
                <option value="">Select User</option>
                {% for user in users %}
                    <option value="{{ user[0] }}">{{ user[1] }}</option>
                {% endfor %}
            </select>

            <select name="category_id" required>
                <option value="">Select Category</option>
                {% for category in categories %}
                    <option value="{{ category[0] }}">{{ category[1] }}</option>
                {% endfor %}
            </select>

            <button type="submit">Add Blog</button>
        </form>

        <h2>Blogs Table</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for blog in blogs %}
                <tr>
                    <td>{{ blog[0] }}</td>
                    <td>{{ blog[1] }}</td>
                    <td>{{ blog[2] }}</td>
                    <td>{{ blog[3] }}</td>
                    <td>{{ blog[4] }}</td>
                    <td>{{ blog[5] }}</td>
                    <td>
                        <a href="/edit/{{ blog[0] }}" class="edit-btn">Edit</a>
                        <form action="/delete/{{ blog[0] }}" method="POST" style="display:inline;">
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
